name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # e.g. v3.0.1
      - "[0-9]+.*"    # bare version e.g. 3.0.1

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Releasing version ${VERSION} from tag ${TAG}"

      - name: Validate version matches tag
        run: |
          PKG_VERSION=$(python -c "import runpy; print(runpy.run_path('tx_verify/__init__.py')['__version__'])")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: pyproject.toml version ($PKG_VERSION) != tag version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
